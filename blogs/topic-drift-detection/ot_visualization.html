<head>

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0d1117;color:#c9d1d9;

  }

</style>

<body>

<h1>Earth Mover's Distance</h1>
<p class="subtitle">Interactive intuition for Optimal Transport between conversation scenes</p>

<div class="tabs">
  <button class="tab active" data-mode="1d">1D · The Metaphor</button>
  <button class="tab" data-mode="2d">2D · Scene Transport</button>
  <button class="tab" data-mode="centroid">Why Not Centroids?</button>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>

<div class="controls">
  <button class="btn primary" id="playBtn">▶ Play</button>
  <button class="btn" id="resetBtn">↺ Reset</button>
  <div class="speed-control">
    <span>Speed</span>
    <input type="range" id="speedSlider" min="0.3" max="3" step="0.1" value="1">
  </div>
  <div id="compToggle" class="comparison-toggle" style="display:none">
    <button class="comp-btn" data-comp="same">Same Theme</button>
    <button class="comp-btn active" data-comp="diff">Different Theme</button>
  </div>
</div>

<div class="info">
  <div class="metric">
    <span class="metric-label">Wasserstein Distance:</span>
    <span class="metric-value blue" id="wDist">—</span>
  </div>
  <div class="metric" id="centroidMetric" style="display:none">
    <span class="metric-label">Centroid Distance:</span>
    <span class="metric-value orange" id="cDist">—</span>
  </div>
</div>

<div class="legend" id="legend"></div>
<div class="explanation" id="explanation"></div>

<script>
// ─── Canvas Setup ────────────────────────────────────────────────────
const W = 880, H = 620;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = W * 2; canvas.height = H * 2;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
ctx.scale(2, 2);

const MONO = "'SF Mono','Fira Code','Consolas','Courier New',monospace";
const SANS = "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif";

// ─── Helper: Update Wasserstein Distance with Color ────────────────────
function updateWDist(value, maxRef = 0.12) {
  const el = document.getElementById('wDist');
  if (value === null || value === undefined) {
    el.textContent = '—';
    el.className = 'metric-value blue';
  } else {
    el.textContent = value.toFixed(4);
    el.classList.remove('blue', 'orange', 'red');
    // Color thresholds: red if > 60% of max, orange if > 30%, blue otherwise
    if (value > maxRef * 0.6) {
      el.classList.add('red');
    } else if (value > maxRef * 0.3) {
      el.classList.add('orange');
    } else {
      el.classList.add('blue');
    }
  }
}

// Add red color style
const style = document.createElement('style');
style.textContent = '.metric-value.red { color: #f85149 !important; }';
document.head.appendChild(style);

// ─── Scene Data ──────────────────────────────────────────────────────
const SCENES = {
  climateA: {
    label: 'Scene A · Climate Policy (hour 1)', short: 'S_A',
    color: '#58a6ff', glow: 'rgba(88,166,255,0.35)',
    utterances: [
      { text: 'Emissions targets revised for 2030',  x: 175, y: 185 },
      { text: 'Carbon pricing mechanism expanded',   x: 215, y: 230 },
      { text: 'International treaty negotiations',   x: 150, y: 245 },
      { text: 'Regulatory timeline pushed forward',  x: 230, y: 170 },
    ]
  },
  climateB: {
    label: 'Scene B · Climate Policy (hour 3)', short: 'S_B',
    color: '#3fb950', glow: 'rgba(63,185,80,0.35)',
    utterances: [
      { text: 'New emissions reduction framework', x: 185, y: 215 },
      { text: 'Carbon tax revenue projections',    x: 225, y: 180 },
      { text: 'Paris Agreement compliance status',  x: 160, y: 260 },
      { text: 'Green energy subsidies debated',     x: 245, y: 190 },
      { text: 'Climate adaptation funding secured', x: 200, y: 275 },
    ]
  },
  economics: {
    label: 'Scene C · Trade Economics (hour 2)', short: 'S_C',
    color: '#f0883e', glow: 'rgba(240,136,62,0.35)',
    utterances: [
      { text: 'Interest rates rose sharply',          x: 610, y: 185 },
      { text: 'Fed announcement on monetary policy',  x: 645, y: 235 },
      { text: 'Inflation still above target',         x: 585, y: 250 },
      { text: 'Market volatility increased',          x: 670, y: 170 },
      { text: 'Bond yields climbing steadily',        x: 625, y: 265 },
    ]
  }
};

const CENTROID_SCENES = {
  spread: {
    label: 'Scene X · Spread distribution', short: 'S_X',
    color: '#bc8cff', glow: 'rgba(188,140,255,0.35)',
    utterances: [
      { text: 'Global emissions policy reform', x: 270, y: 125 },
      { text: 'Domestic inflation concerns',     x: 440, y: 155 },
      { text: 'Renewable energy investments',    x: 320, y: 305 },
      { text: 'Trade deficit analysis',          x: 490, y: 335 },
      { text: 'Fiscal stimulus debate',          x: 380, y: 230 },
    ]
  },
  tight: {
    label: 'Scene Y · Tight cluster', short: 'S_Y',
    color: '#f778ba', glow: 'rgba(247,120,186,0.35)',
    utterances: [
      { text: 'Mid-year budget review underway',     x: 370, y: 215 },
      { text: 'Quarterly economic outlook released',  x: 395, y: 242 },
      { text: 'Central bank meeting scheduled',       x: 380, y: 228 },
      { text: 'GDP growth estimate revised',          x: 398, y: 252 },
      { text: 'Employment figures stable',            x: 362, y: 238 },
    ]
  }
};

// ─── State ───────────────────────────────────────────────────────────
let state = {
  mode: '1d', comp: 'diff',
  playing: false, progress: 0, speed: 1,
  hovered: null,
};

// ─── 1D Particle System ──────────────────────────────────────────────
const NUM_PARTICLES = 20;
const SRC_WEIGHTS = [0, 1, 4, 6, 5, 3, 1, 0, 0, 0]; // particle counts per bin (sum=20)
const TGT_WEIGHTS = [0, 0, 0, 0, 1, 2, 4, 7, 4, 2]; // particle counts per bin (sum=20)
const NUM_BINS = 10;

function generate1DParticles() {
  const srcList = [], tgtList = [];
  for (let b = 0; b < NUM_BINS; b++) {
    for (let s = 0; s < SRC_WEIGHTS[b]; s++) srcList.push({ bin: b, stack: s });
    for (let s = 0; s < TGT_WEIGHTS[b]; s++) tgtList.push({ bin: b, stack: s });
  }
  // 1D optimal transport: sort by position and match by rank
  const particles = [];
  for (let i = 0; i < srcList.length; i++) {
    const dist = Math.abs(tgtList[i].bin - srcList[i].bin);
    particles.push({
      srcBin: srcList[i].bin, tgtBin: tgtList[i].bin,
      srcStack: srcList[i].stack, tgtStack: tgtList[i].stack,
      distance: dist,
      cost: (1 / NUM_PARTICLES) * dist / NUM_BINS,
      animStart: 0.04 + (i / srcList.length) * 0.82,
      animDur: 0.06,
    });
  }
  return particles;
}
const particles1D = generate1DParticles();
const totalCost1D = particles1D.reduce((s, p) => s + p.cost, 0);

// 1D layout constants
const BIN_W = 52, BIN_GAP = 8;
const TOTAL_BIN_W = NUM_BINS * (BIN_W + BIN_GAP) - BIN_GAP;
const BIN_START_X = (W - TOTAL_BIN_W) / 2;
const NUMBER_LINE_Y = 260;
const PARTICLE_R = 9;
const PARTICLE_SPACING = PARTICLE_R * 2 + 3;

function binCenterX(bin) { return BIN_START_X + bin * (BIN_W + BIN_GAP) + BIN_W / 2; }
function srcParticlePos(bin, stack) {
  return { x: binCenterX(bin), y: NUMBER_LINE_Y - 22 - stack * PARTICLE_SPACING };
}
function tgtParticlePos(bin, stack) {
  return { x: binCenterX(bin), y: NUMBER_LINE_Y + 22 + stack * PARTICLE_SPACING };
}

// ─── 2D Transport Solver ─────────────────────────────────────────────
function eucDist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }
const MAX_CANVAS_DIST = Math.sqrt(W*W+H*H);

function solveTransport(srcPts, tgtPts) {
  const n = srcPts.length, m = tgtPts.length;
  const remS = srcPts.map(() => 1/n), remD = tgtPts.map(() => 1/m);
  const costs = [];
  for (let i = 0; i < n; i++) {
    costs[i] = [];
    for (let j = 0; j < m; j++) costs[i][j] = eucDist(srcPts[i], tgtPts[j]) / MAX_CANVAS_DIST;
  }
  const pairs = [];
  for (let i = 0; i < n; i++)
    for (let j = 0; j < m; j++)
      pairs.push({ i, j, cost: costs[i][j] });
  pairs.sort((a, b) => a.cost - b.cost);

  const flows = [];
  for (const { i, j, cost } of pairs) {
    const amount = Math.min(remS[i], remD[j]);
    if (amount > 1e-9) {
      flows.push({ from: srcPts[i], to: tgtPts[j], fromIdx: i, toIdx: j, amount, cost, totalCost: amount*cost });
      remS[i] -= amount; remD[j] -= amount;
    }
  }
  flows.sort((a, b) => a.cost - b.cost);
  return { flows, totalCost: flows.reduce((s,f) => s+f.totalCost, 0) };
}

function centroid(pts) {
  return { x: pts.reduce((s,p)=>s+p.x,0)/pts.length, y: pts.reduce((s,p)=>s+p.y,0)/pts.length };
}

// ─── Easing ──────────────────────────────────────────────────────────
function easeInOutCubic(t) { return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
function easeOutBack(t) { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
function easeOutQuart(t) { return 1-Math.pow(1-t,4); }

// ─── Quadratic Bezier helpers ────────────────────────────────────────
function bezierPoint(p0, p1, p2, t) {
  const u=1-t;
  return { x: u*u*p0.x+2*u*t*p1.x+t*t*p2.x, y: u*u*p0.y+2*u*t*p1.y+t*t*p2.y };
}

// ─── Drawing Helpers ─────────────────────────────────────────────────
function drawDot(x, y, r, color, glowColor, isHovered) {
  ctx.save();
  if (glowColor) { ctx.shadowColor = glowColor; ctx.shadowBlur = isHovered ? 22 : 12; }
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, isHovered ? r+2 : r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  if (isHovered) { ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke(); }
  ctx.restore();
}

function drawMassRing(x, y, massRatio, maxR, color) {
  // massRatio: 0..1 — how full the ring is
  if (massRatio <= 0) return;
  const r = 6 + maxR * massRatio;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.3 + 0.5 * massRatio;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawOutlineDot(x, y, r, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha || 0.3;
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha = 1; ctx.restore();
}

function drawText(x, y, text, color, size, align, baseline, font) {
  ctx.save();
  ctx.fillStyle = color||'#8b949e';
  ctx.font = `${size||11}px ${font||SANS}`;
  ctx.textAlign = align||'center'; ctx.textBaseline = baseline||'top';
  ctx.fillText(text, x, y); ctx.restore();
}

function drawBold(x, y, text, color, size) {
  ctx.save();
  ctx.fillStyle = color||'#e6edf3';
  ctx.font = `600 ${size||13}px ${SANS}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y); ctx.restore();
}

function drawMono(x, y, text, color, size, align) {
  ctx.save();
  ctx.fillStyle = color||'#c9d1d9';
  ctx.font = `${size||12}px ${MONO}`;
  ctx.textAlign = align||'left'; ctx.textBaseline = 'top';
  ctx.fillText(text, x, y); ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawFormulaBox(x, y, w, h) {
  ctx.save();
  ctx.fillStyle = 'rgba(13,17,23,0.92)';
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  roundRect(x, y, w, h, 8); ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ─── Glowing traveling orb ───────────────────────────────────────────
function drawTravelingOrb(x, y, r, color, trail) {
  ctx.save();
  // Trail
  if (trail && trail.length > 1) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.moveTo(trail[0].x, trail[0].y);
    for (let i = 1; i < trail.length; i++) ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 8;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r*0.6, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ─── Distance ruler (1D) ────────────────────────────────────────────
function drawDistanceRuler(x1, x2, y, label, color) {
  ctx.save();
  ctx.strokeStyle = color || '#f0883e';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.7;
  // Horizontal line
  ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
  // End caps
  const capH = 6;
  ctx.beginPath(); ctx.moveTo(x1, y-capH); ctx.lineTo(x1, y+capH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x2, y-capH); ctx.lineTo(x2, y+capH); ctx.stroke();
  // Arrow heads
  const dir = x2 > x1 ? 1 : -1;
  ctx.beginPath(); ctx.moveTo(x2, y); ctx.lineTo(x2-dir*6, y-4); ctx.lineTo(x2-dir*6, y+4); ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;
  // Label
  if (label) {
    const mx = (x1+x2)/2;
    drawMono(mx, y - 16, label, color || '#f0883e', 10, 'center');
  }
  ctx.restore();
}

// ─── Landing burst effect ───────────────────────────────────────────
let landingBursts = [];
function addBurst(x, y, color) {
  landingBursts.push({ x, y, color, birth: performance.now(), dur: 400 });
}
function drawBursts() {
  const now = performance.now();
  landingBursts = landingBursts.filter(b => now - b.birth < b.dur);
  for (const b of landingBursts) {
    const t = (now - b.birth) / b.dur;
    const r = 6 + 20 * easeOutQuart(t);
    ctx.save();
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 2 * (1-t);
    ctx.globalAlpha = 0.6 * (1-t);
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1; ctx.restore();
  }
}

// ─── RENDER: 1D Mode ─────────────────────────────────────────────────
let prev1DLanded = new Set();

function render1D() {
  ctx.clearRect(0, 0, W, H);
  const p = state.progress;

  // Title
  drawBold(W/2, 28, "Earth Mover's Distance in 1D", '#e6edf3', 15);
  drawText(W/2, 46, 'Each particle is a unit of mass. Watch them physically move to the target distribution.', '#8b949e', 11);

  // Number line
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(BIN_START_X-12, NUMBER_LINE_Y); ctx.lineTo(BIN_START_X+TOTAL_BIN_W+12, NUMBER_LINE_Y); ctx.stroke();
  // Bin tick marks & labels
  for (let b = 0; b < NUM_BINS; b++) {
    const cx = binCenterX(b);
    ctx.beginPath(); ctx.moveTo(cx, NUMBER_LINE_Y-4); ctx.lineTo(cx, NUMBER_LINE_Y+4); ctx.stroke();
    drawText(cx, NUMBER_LINE_Y+7, `0.${b}`, '#6e7681', 10);
  }
  drawText(W/2, NUMBER_LINE_Y+22, 'Semantic position →', '#3d444d', 10);

  // Source label
  drawText(BIN_START_X-5, NUMBER_LINE_Y-18, 'Source', '#58a6ff', 10, 'left', 'middle');
  drawText(BIN_START_X-5, NUMBER_LINE_Y+14, 'Target', '#3fb950', 10, 'left', 'middle');

  // Draw target ghost outlines (always visible)
  for (let b = 0; b < NUM_BINS; b++) {
    for (let s = 0; s < TGT_WEIGHTS[b]; s++) {
      const pos = tgtParticlePos(b, s);
      drawOutlineDot(pos.x, pos.y, PARTICLE_R, '#3fb950', 0.2);
    }
  }

  // Compute particle states and draw
  let accCost = 0;
  const currentlyMoving = [];
  const landed = new Set();

  for (let i = 0; i < particles1D.length; i++) {
    const part = particles1D[i];
    const src = srcParticlePos(part.srcBin, part.srcStack);
    const tgt = tgtParticlePos(part.tgtBin, part.tgtStack);

    let t = 0; // animation progress for this particle
    if (p > part.animStart) {
      t = Math.min((p - part.animStart) / part.animDur, 1);
    }

    if (t <= 0) {
      // Still at source — draw as solid blue circle
      drawDot(src.x, src.y, PARTICLE_R, '#58a6ff', 'rgba(88,166,255,0.2)', false);
    } else if (t >= 1) {
      // Landed at target — draw as green
      drawDot(tgt.x, tgt.y, PARTICLE_R, '#3fb950', 'rgba(63,185,80,0.2)', false);
      accCost += part.cost;
      landed.add(i);
      // Burst on first landing
      if (!prev1DLanded.has(i)) addBurst(tgt.x, tgt.y, '#3fb950');
    } else {
      // In motion — draw source ghost + traveling orb
      drawOutlineDot(src.x, src.y, PARTICLE_R, '#58a6ff', 0.15);

      // Parabolic arc
      const eased = easeInOutCubic(t);
      const arcHeight = 35 + Math.abs(part.distance) * 12;
      const cpY = Math.min(src.y, tgt.y) - arcHeight;
      const cp = { x: (src.x + tgt.x) / 2, y: cpY };
      const pos = bezierPoint(src, cp, tgt, eased);

      // Trail
      const trail = [];
      for (let tt = Math.max(0, eased - 0.25); tt <= eased; tt += 0.03) {
        trail.push(bezierPoint(src, cp, tgt, tt));
      }
      drawTravelingOrb(pos.x, pos.y, PARTICLE_R * 0.7, '#58a6ff', trail);

      // Distance ruler along number line
      if (part.distance > 0) {
        drawDistanceRuler(
          binCenterX(part.srcBin), binCenterX(part.tgtBin),
          NUMBER_LINE_Y + 60 + (i % 3) * 18,
          `d = ${part.distance}`, '#f0883e'
        );
      }

      currentlyMoving.push(part);
      accCost += part.cost * eased;
    }
  }
  prev1DLanded = landed;

  // Landing bursts
  drawBursts();

  // ─── Formula Panel ──────────────────────────────────────────────────
  const fmY = 445, fmH = 115, fmX = 80, fmW = W - 160;
  drawFormulaBox(fmX, fmY, fmW, fmH);

  drawMono(fmX+14, fmY+10, 'W = Σ  mᵢ × dᵢ', '#8b949e', 12);

  // Show individual terms for landed particles
  if (landed.size > 0 || currentlyMoving.length > 0) {
    const terms = [];
    for (let i = 0; i < particles1D.length; i++) {
      const part = particles1D[i];
      if (part.distance === 0) continue;
      let t = 0;
      if (p > part.animStart) t = Math.min((p - part.animStart) / part.animDur, 1);
      if (t > 0) {
        terms.push({ d: part.distance, active: t < 1, cost: part.cost });
      }
    }

    // Show last N terms that fit
    const maxTerms = 10;
    const visibleTerms = terms.slice(-maxTerms);
    const startIdx = Math.max(0, terms.length - maxTerms);

    let termStr = startIdx > 0 ? '... + ' : '  = ';
    visibleTerms.forEach((t, i) => {
      const prefix = (i > 0 || startIdx > 0) ? ' + ' : '';
      const termText = `1/${NUM_PARTICLES}×${t.d}`;
      termStr += prefix + termText;
    });

    drawMono(fmX+14, fmY+30, termStr, '#6e7681', 10);

    // Divider line
    ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(fmX+14, fmY+50); ctx.lineTo(fmX+fmW-14, fmY+50); ctx.stroke();

    // Total
    const showCost = p >= 0.9 ? totalCost1D : accCost;
    drawMono(fmX+14, fmY+58, `  W = ${showCost.toFixed(4)}`, '#58a6ff', 14);

    // Mass info
    drawMono(fmX+14, fmY+82, `each particle mass = 1/${NUM_PARTICLES} = ${(1/NUM_PARTICLES).toFixed(2)}`, '#6e7681', 10);
    drawMono(fmX+14, fmY+96, `cost = mass × distance / bins    |    ${landed.size}/${NUM_PARTICLES} particles landed`, '#6e7681', 10);
  } else {
    drawMono(fmX+14, fmY+35, '  Press Play to watch mass move from source → target', '#6e7681', 11);
    drawMono(fmX+14, fmY+58, '  W = ?', '#58a6ff', 14);
    drawMono(fmX+14, fmY+82, `each particle = 1/${NUM_PARTICLES} of total mass`, '#6e7681', 10);
    drawMono(fmX+14, fmY+96, 'total work = Σ (mass × distance moved)', '#6e7681', 10);
  }

  // Update UI
  const displayCost = p >= 0.9 ? totalCost1D : accCost;
  updateWDist(p > 0 ? displayCost : null, totalCost1D * 1.1);
}

// ─── RENDER: 2D Scene Transport ──────────────────────────────────────
let prev2DLanded = new Set();

function render2D() {
  ctx.clearRect(0, 0, W, H);
  const p = state.progress;

  const sceneA = SCENES.climateA;
  const sceneB = state.comp === 'same' ? SCENES.climateB : SCENES.economics;
  const srcPts = sceneA.utterances;
  const tgtPts = sceneB.utterances;
  const n = srcPts.length, m = tgtPts.length;
  const result = solveTransport(srcPts, tgtPts);
  const flows = result.flows;
  const maxAmt = Math.max(...flows.map(f => f.amount), 0.01);

  // Title
  drawBold(W/2, 22, 'Optimal Transport Between Scenes', '#e6edf3', 15);
  const sub = state.comp === 'same'
    ? 'Same theme recurring — mass travels short distances'
    : 'Different themes — mass must cross the full semantic gap';
  drawText(W/2, 42, sub, '#8b949e', 11);

  // Subtle grid
  ctx.strokeStyle = '#161b22'; ctx.lineWidth = 1;
  for (let x = 50; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x,55); ctx.lineTo(x,440); ctx.stroke(); }
  for (let y = 55; y < 440; y += 50) { ctx.beginPath(); ctx.moveTo(50,y); ctx.lineTo(W-50,y); ctx.stroke(); }

  // Compute mass remaining / accumulated per dot
  const srcMassRemaining = srcPts.map(() => 1/n);
  const tgtMassAccumulated = tgtPts.map(() => 0);
  const completedTerms = [];
  let accCost = 0;
  const currentLanded = new Set();

  // Process flows
  flows.forEach((f, idx) => {
    const flowStart = idx / flows.length * 0.82;
    const flowDur = 0.09;
    let t = 0;
    if (p > flowStart) t = Math.min((p - flowStart) / flowDur, 1);

    if (t > 0) {
      const transferred = f.amount * Math.min(t, 1);
      srcMassRemaining[f.fromIdx] -= transferred;
      tgtMassAccumulated[f.toIdx] += transferred;

      if (t >= 1) {
        accCost += f.totalCost;
        completedTerms.push(f);
        currentLanded.add(idx);
        if (!prev2DLanded.has(idx)) addBurst(f.to.x, f.to.y, sceneB.color);
      } else {
        accCost += f.totalCost * t;
        // Draw traveling orb
        const eased = easeInOutCubic(t);
        const dx = f.to.x-f.from.x, dy = f.to.y-f.from.y;
        const cp = {
          x: (f.from.x+f.to.x)/2 + (-dy)*0.18,
          y: (f.from.y+f.to.y)/2 + (dx)*0.18
        };
        const pos = bezierPoint(f.from, cp, f.to, eased);

        // Trail
        const trail = [];
        for (let tt = Math.max(0, eased-0.3); tt <= eased; tt += 0.04)
          trail.push(bezierPoint(f.from, cp, f.to, tt));

        const orbR = 3 + 5 * (f.amount / maxAmt);
        drawTravelingOrb(pos.x, pos.y, orbR, sceneA.color, trail);

        // Faint connecting line
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1; ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(f.from.x, f.from.y); ctx.lineTo(f.to.x, f.to.y); ctx.stroke();
        ctx.setLineDash([]); ctx.restore();
      }
    }
  });
  prev2DLanded = currentLanded;

  // Draw completed flow lines (faint)
  for (const f of completedTerms) {
    const alpha = 0.08 + 0.15 * (f.amount / maxAmt);
    ctx.save();
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 1 + 3 * (f.amount / maxAmt);
    const dx = f.to.x-f.from.x, dy = f.to.y-f.from.y;
    const cp = { x:(f.from.x+f.to.x)/2+(-dy)*0.18, y:(f.from.y+f.to.y)/2+(dx)*0.18 };
    ctx.beginPath(); ctx.moveTo(f.from.x, f.from.y);
    ctx.quadraticCurveTo(cp.x, cp.y, f.to.x, f.to.y); ctx.stroke();
    ctx.restore();

    // Per-flow cost annotation (small, near midpoint)
    const mid = bezierPoint(f.from, cp, f.to, 0.5);
    ctx.save(); ctx.globalAlpha = 0.5;
    drawMono(mid.x+8, mid.y-6, (f.totalCost*1000|0)/1000+'', '#6e7681', 8, 'left');
    ctx.globalAlpha = 1; ctx.restore();
  }

  // Draw source dots with mass rings
  srcPts.forEach((u, i) => {
    const isHov = state.hovered && state.hovered.scene === 'A' && state.hovered.idx === i;
    const massRatio = Math.max(srcMassRemaining[i] * n, 0); // 0..1
    drawMassRing(u.x, u.y, massRatio, 14, sceneA.color);
    drawDot(u.x, u.y, 6, sceneA.color, sceneA.glow, isHov);
    // Source indicator ring
    ctx.save(); ctx.strokeStyle = sceneA.color; ctx.lineWidth = 1; ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.arc(u.x, u.y, 10, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1; ctx.restore();
  });

  // Draw target dots with mass rings
  tgtPts.forEach((u, i) => {
    const isHov = state.hovered && state.hovered.scene === 'B' && state.hovered.idx === i;
    const massRatio = Math.min(tgtMassAccumulated[i] * m, 1);
    if (p === 0) {
      // Draw as outline when no mass yet
      drawOutlineDot(u.x, u.y, 6, sceneB.color, 0.4);
    } else {
      drawMassRing(u.x, u.y, massRatio, 14, sceneB.color);
      const dotAlpha = 0.3 + 0.7 * massRatio;
      ctx.save(); ctx.globalAlpha = dotAlpha;
      drawDot(u.x, u.y, 6, sceneB.color, sceneB.glow, isHov);
      ctx.globalAlpha = 1; ctx.restore();
    }
  });

  drawBursts();

  // Scene labels
  const cA = centroid(srcPts), cB = centroid(tgtPts);
  drawBold(cA.x, Math.min(...srcPts.map(u=>u.y))-32, sceneA.label, sceneA.color, 10);
  drawText(cA.x, Math.min(...srcPts.map(u=>u.y))-18, `${n} utterances · mass = 1/${n} each`, '#6e7681', 9);
  drawBold(cB.x, Math.min(...tgtPts.map(u=>u.y))-32, sceneB.label, sceneB.color, 10);
  drawText(cB.x, Math.min(...tgtPts.map(u=>u.y))-18, `${m} utterances · mass = 1/${m} each`, '#6e7681', 9);

  // ─── Formula Panel ──────────────────────────────────────────────────
  const fmY = 460, fmH = 105, fmX = 60, fmW = W - 120;
  drawFormulaBox(fmX, fmY, fmW, fmH);

  drawMono(fmX+14, fmY+10, 'W(S_A, S_B)  =  min_T  Σ T_ij · c(ê_i, ê_j)', '#8b949e', 11);
  drawMono(fmX+14, fmY+28, `c(ê_i, ê_j) = 1 - cos(ê_i, ê_j)     [cosine dissimilarity]`, '#6e7681', 9);

  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(fmX+14, fmY+45); ctx.lineTo(fmX+fmW-14, fmY+45); ctx.stroke();

  if (p > 0) {
    const showCost = p >= 0.9 ? result.totalCost : accCost;
    const flowsDone = completedTerms.length;
    drawMono(fmX+14, fmY+52, `W = ${showCost.toFixed(4)}`, '#58a6ff', 14);
    drawMono(fmX+14, fmY+74, `${flowsDone}/${flows.length} transport flows completed`, '#6e7681', 10);
    drawMono(fmX+14, fmY+88, `Σ row = 1/${n}   Σ col = 1/${m}   [mass conservation]`, '#6e7681', 9);
  } else {
    drawMono(fmX+14, fmY+52, 'W = ?', '#58a6ff', 14);
    drawMono(fmX+14, fmY+74, 'Press Play — watch mass flow from source to target dots', '#6e7681', 10);
    drawMono(fmX+14, fmY+88, 'Source dots shrink as mass leaves · Target dots grow as mass arrives', '#6e7681', 9);
  }

  // Update UI
  const displayCost = p >= 0.9 ? result.totalCost : accCost;
  const maxRef = state.comp === 'same' ? 0.035 : 0.12;
  updateWDist(p > 0 ? displayCost : null, maxRef);
}

// ─── RENDER: Centroid Comparison ─────────────────────────────────────
let prevCentroidLanded = new Set();

function renderCentroid() {
  ctx.clearRect(0, 0, W, H);
  const p = state.progress;

  const scX = CENTROID_SCENES.spread, scY = CENTROID_SCENES.tight;
  const cX = centroid(scX.utterances), cY = centroid(scY.utterances);
  const cDistVal = eucDist(cX, cY) / MAX_CANVAS_DIST;

  drawBold(W/2, 22, 'Why Not Just Compare Centroids?', '#e6edf3', 15);
  drawText(W/2, 42, 'Two scenes with nearly identical centroids — but very different distributional shapes', '#8b949e', 11);

  // Grid
  ctx.strokeStyle = '#161b22'; ctx.lineWidth = 1;
  for (let x = 50; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x,55); ctx.lineTo(x,440); ctx.stroke(); }
  for (let y = 55; y < 440; y += 50) { ctx.beginPath(); ctx.moveTo(50,y); ctx.lineTo(W-50,y); ctx.stroke(); }

  // Phase timing
  const dotsIn = Math.min(p / 0.12, 1);
  const centroidIn = p > 0.15 ? Math.min((p-0.15)/0.1, 1) : 0;
  const centroidFlash = p > 0.25 && p < 0.45 ? 1 : p >= 0.45 ? Math.max(0, 1-(p-0.45)/0.1) : 0;
  const otStart = 0.45;
  const otP = p > otStart ? (p-otStart)/(1-otStart) : 0;

  // Draw dots
  ctx.save(); ctx.globalAlpha = dotsIn;
  scX.utterances.forEach((u,i) => {
    const isHov = state.hovered && state.hovered.scene==='X' && state.hovered.idx===i;
    drawDot(u.x, u.y, 7, scX.color, scX.glow, isHov);
  });
  scY.utterances.forEach((u,i) => {
    const isHov = state.hovered && state.hovered.scene==='Y' && state.hovered.idx===i;
    drawDot(u.x, u.y, 7, scY.color, scY.glow, isHov);
  });
  ctx.globalAlpha = 1; ctx.restore();

  drawBold(280, 100, scX.label, scX.color, 10);
  drawBold(480, 195, scY.label, scY.color, 10);

  // Centroid phase
  if (centroidIn > 0) {
    ctx.save(); ctx.globalAlpha = centroidIn;

    // Centroid markers
    [{ c: cX, col: scX.color }, { c: cY, col: scY.color }].forEach(({ c, col }) => {
      ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.arc(c.x, c.y, 14, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      // Crosshair
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(c.x-8, c.y); ctx.lineTo(c.x+8, c.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(c.x, c.y-8); ctx.lineTo(c.x, c.y+8); ctx.stroke();
    });

    // Distance line between centroids
    const lineAlpha = centroidFlash > 0 ? centroidFlash : 0.3;
    ctx.globalAlpha = lineAlpha * centroidIn;
    ctx.strokeStyle = '#f0883e'; ctx.lineWidth = 2.5; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(cX.x, cX.y); ctx.lineTo(cY.x, cY.y); ctx.stroke();
    ctx.setLineDash([]);

    const midX = (cX.x+cY.x)/2, midY = (cX.y+cY.y)/2;
    ctx.globalAlpha = centroidIn;
    drawBold(midX, midY-18, `Centroid dist = ${cDistVal.toFixed(3)}`, '#f0883e', 12);
    if (centroidFlash > 0.5) {
      drawText(midX, midY+2, '"Almost identical — same topic?"', '#f0883e', 10);
    }

    ctx.globalAlpha = 1; ctx.restore();
  }

  // OT phase — mass transfer
  if (otP > 0) {
    const result = solveTransport(scX.utterances, scY.utterances);
    const flows = result.flows;
    const maxAmt = Math.max(...flows.map(f=>f.amount), 0.01);
    let accCost = 0;
    const currentLanded = new Set();

    // Mass tracking
    const srcMass = scX.utterances.map(() => 1/scX.utterances.length);
    const tgtMass = scY.utterances.map(() => 0);

    flows.forEach((f, idx) => {
      const flowStart = idx / flows.length * 0.82;
      const flowDur = 0.1;
      let t = 0;
      if (otP > flowStart) t = Math.min((otP-flowStart)/flowDur, 1);
      if (t <= 0) return;

      const transferred = f.amount * Math.min(t,1);
      srcMass[f.fromIdx] -= transferred;
      tgtMass[f.toIdx] += transferred;

      if (t >= 1) {
        accCost += f.totalCost;
        currentLanded.add(idx);
        if (!prevCentroidLanded.has(idx)) addBurst(f.to.x, f.to.y, '#58a6ff');
        // Completed flow line
        ctx.save();
        ctx.strokeStyle = `rgba(88,166,255,${0.1+0.2*(f.amount/maxAmt)})`;
        ctx.lineWidth = 1+3*(f.amount/maxAmt);
        const dx=f.to.x-f.from.x, dy=f.to.y-f.from.y;
        const cp={x:(f.from.x+f.to.x)/2+(-dy)*0.15, y:(f.from.y+f.to.y)/2+(dx)*0.15};
        ctx.beginPath(); ctx.moveTo(f.from.x,f.from.y);
        ctx.quadraticCurveTo(cp.x,cp.y,f.to.x,f.to.y); ctx.stroke();
        ctx.restore();
      } else {
        accCost += f.totalCost * t;
        const eased = easeInOutCubic(t);
        const dx=f.to.x-f.from.x, dy=f.to.y-f.from.y;
        const cp={x:(f.from.x+f.to.x)/2+(-dy)*0.15, y:(f.from.y+f.to.y)/2+(dx)*0.15};
        const pos = bezierPoint(f.from, cp, f.to, eased);
        const trail = [];
        for (let tt=Math.max(0,eased-0.3); tt<=eased; tt+=0.04)
          trail.push(bezierPoint(f.from, cp, f.to, tt));
        drawTravelingOrb(pos.x, pos.y, 3+4*(f.amount/maxAmt), '#58a6ff', trail);
      }
    });
    prevCentroidLanded = currentLanded;

    // Redraw dots with mass rings
    scX.utterances.forEach((u,i) => {
      const ratio = Math.max(srcMass[i]*scX.utterances.length, 0);
      drawMassRing(u.x, u.y, ratio, 12, scX.color);
    });
    scY.utterances.forEach((u,i) => {
      const ratio = Math.min(tgtMass[i]*scY.utterances.length, 1);
      drawMassRing(u.x, u.y, ratio, 12, scY.color);
    });

    drawBursts();

    document.getElementById('centroidMetric').style.display = 'flex';
    document.getElementById('cDist').textContent = cDistVal.toFixed(3);

    // Formula
    const showOT = otP >= 0.9 ? result.totalCost : accCost;
    updateWDist(showOT, 0.12);

    // ─── Formula Panel ────────────────────────────────────────────────
    const fmY=460,fmH=105,fmX=60,fmW=W-120;
    drawFormulaBox(fmX,fmY,fmW,fmH);

    drawMono(fmX+14, fmY+10, 'Centroid says:  d = ‖μ_X − μ_Y‖ = '+cDistVal.toFixed(3)+'   ← "same topic"', '#f0883e', 11);
    drawMono(fmX+14, fmY+30, 'OT says:        W(X, Y)          = '+showOT.toFixed(4)+'   ← "NOT the same"', '#58a6ff', 11);

    ctx.strokeStyle='#30363d';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fmX+14,fmY+50);ctx.lineTo(fmX+fmW-14,fmY+50);ctx.stroke();

    const ratio = showOT > 0 ? (showOT / cDistVal) : 0;
    drawMono(fmX+14, fmY+58, `OT / Centroid ratio = ${ratio.toFixed(1)}×`, ratio > 2 ? '#f85149' : '#c9d1d9', 13);
    drawMono(fmX+14, fmY+80, 'OT captures distributional SHAPE, not just location.', '#8b949e', 10);
    drawMono(fmX+14, fmY+94, 'Spread scene has mass far from center → mass must travel far → high W', '#6e7681', 9);
  } else {
    // Pre-OT formula
    const fmY=460,fmH=105,fmX=60,fmW=W-120;
    drawFormulaBox(fmX,fmY,fmW,fmH);
    drawMono(fmX+14, fmY+10, 'Step 1:  Compute centroids μ_X, μ_Y', '#8b949e', 11);
    drawMono(fmX+14, fmY+28, 'Step 2:  Centroid distance d = ‖μ_X − μ_Y‖', '#8b949e', 11);
    drawMono(fmX+14, fmY+50, 'Problem: both scenes have the same center of mass', '#f0883e', 11);
    drawMono(fmX+14, fmY+68, '         but very different SPREADS', '#f0883e', 11);
    drawMono(fmX+14, fmY+88, 'Press Play → watch OT reveal what centroids miss', '#6e7681', 10);
  }
}

// ─── Main Render ─────────────────────────────────────────────────────
function render() {
  switch (state.mode) {
    case '1d': render1D(); break;
    case '2d': render2D(); break;
    case 'centroid': renderCentroid(); break;
  }
}

// ─── Animation Loop ──────────────────────────────────────────────────
let lastTime = 0;
function animate(ts) {
  if (!lastTime) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;
  if (state.playing) {
    state.progress = Math.min(state.progress + dt * state.speed * 0.35, 1);
    if (state.progress >= 1) {
      state.playing = false;
      document.getElementById('playBtn').textContent = '▶ Replay';
    }
  }
  render();
  requestAnimationFrame(animate);
}

// ─── Tooltip ─────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX-rect.left)*(W/rect.width);
  const my = (e.clientY-rect.top)*(H/rect.height);
  let found = null;
  const allScenes = state.mode==='centroid'
    ? [{key:'X',scene:CENTROID_SCENES.spread},{key:'Y',scene:CENTROID_SCENES.tight}]
    : state.mode==='2d'
      ? [{key:'A',scene:SCENES.climateA},{key:'B',scene:state.comp==='same'?SCENES.climateB:SCENES.economics}]
      : [];
  for (const {key,scene} of allScenes) {
    scene.utterances.forEach((u,i) => {
      if (Math.abs(mx-u.x)<16 && Math.abs(my-u.y)<16)
        found = {scene:key,idx:i,text:u.text,x:e.clientX,y:e.clientY};
    });
  }
  state.hovered = found;
  if (found) {
    tooltip.textContent = found.text;
    tooltip.className = 'tooltip show';
    const wr = canvas.parentElement.getBoundingClientRect();
    tooltip.style.left = (found.x-wr.left+10)+'px';
    tooltip.style.top = (found.y-wr.top-30)+'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.className = 'tooltip';
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', () => {
  state.hovered = null; tooltip.className = 'tooltip';
});

// ─── Controls ────────────────────────────────────────────────────────
function resetState() {
  state.playing = false; state.progress = 0; lastTime = 0;
  prev1DLanded = new Set(); prev2DLanded = new Set(); prevCentroidLanded = new Set();
  landingBursts = [];
  document.getElementById('playBtn').textContent = '▶ Play';
  updateWDist(null);
  document.getElementById('cDist').textContent = '—';
}

document.getElementById('playBtn').addEventListener('click', () => {
  if (state.progress >= 1) {
    state.progress = 0;
    prev1DLanded = new Set(); prev2DLanded = new Set(); prevCentroidLanded = new Set();
    landingBursts = [];
  }
  state.playing = !state.playing;
  document.getElementById('playBtn').textContent = state.playing ? '⏸ Pause' : '▶ Play';
});
document.getElementById('resetBtn').addEventListener('click', resetState);
document.getElementById('speedSlider').addEventListener('input', (e) => {
  state.speed = parseFloat(e.target.value);
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mode = tab.dataset.mode;
    resetState();
    document.getElementById('compToggle').style.display = state.mode==='2d' ? 'flex' : 'none';
    document.getElementById('centroidMetric').style.display = state.mode==='centroid' ? 'flex' : 'none';
    updateExplanation(); updateLegend();
  });
});

// Comparison toggle
document.querySelectorAll('.comp-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.comp-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.comp = btn.dataset.comp;
    resetState(); updateLegend();
  });
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code==='Space') { e.preventDefault(); document.getElementById('playBtn').click(); }
  else if (e.code==='KeyR') document.getElementById('resetBtn').click();
});

// ─── Explanation ─────────────────────────────────────────────────────
const EXPLANATIONS = {
  '1d': `<strong>The "Earth Mover" metaphor — now with actual moving earth.</strong> Each blue circle is a particle of mass (1/20 of the total). The dashed green circles are the target slots. Press Play and watch each particle <strong>physically arc</strong> from its source position to its optimal target. The orange distance ruler shows how far each particle travels. Every move costs <strong>mass × distance</strong>. The formula panel builds up the total Wasserstein distance term by term as particles land.`,
  '2d': `<strong>Scene-level transport with mass transfer.</strong> Each dot is an utterance embedding. Source dots have a <strong>mass ring</strong> that shrinks as mass departs. Target dots start as outlines and <strong>grow</strong> as mass arrives. Glowing orbs carry mass along curved optimal paths. The formula shows <strong>W = Σ T_ij · c(ê_i, ê_j)</strong> building up flow by flow. Toggle <strong>Same Theme</strong> vs <strong>Different Theme</strong> — notice how the orbs barely travel in the first case but must cross the full semantic gap in the second.`,
  'centroid': `<strong>The centroid trap — exposed by OT.</strong> Scene X is spread across the space. Scene Y is a tight cluster. Phase 1 shows their centroids are nearly identical — centroid distance says "same topic." Phase 2: OT flows animate and reveal the truth. Mass from the spread scene must travel <strong>far</strong> to reach the tight cluster, producing a much higher distance. The formula panel shows both metrics side by side. <strong>OT sees distributional shape. Centroids don't.</strong>`,
};
function updateExplanation() {
  document.getElementById('explanation').innerHTML = EXPLANATIONS[state.mode];
}
function updateLegend() {
  const el = document.getElementById('legend');
  if (state.mode==='1d') {
    el.innerHTML = '<span><span class="legend-dot" style="background:#58a6ff"></span>Source particles</span><span><span class="legend-dot" style="background:#3fb950"></span>Target slots</span><span><span class="legend-dot" style="background:#f0883e"></span>Distance ruler</span><span><span class="legend-dot" style="background:#fff"></span>Traveling mass</span>';
  } else if (state.mode==='2d') {
    const c = state.comp==='same' ? '#3fb950' : '#f0883e';
    const l = state.comp==='same' ? 'Scene B · Climate (hour 3)' : 'Scene C · Economics (hour 2)';
    el.innerHTML = `<span><span class="legend-dot" style="background:#58a6ff"></span>Scene A · Climate</span><span><span class="legend-dot" style="background:${c}"></span>${l}</span><span><span class="legend-dot" style="background:#fff;border:1px solid #30363d"></span>Mass ring</span>`;
  } else {
    el.innerHTML = '<span><span class="legend-dot" style="background:#bc8cff"></span>Scene X · Spread</span><span><span class="legend-dot" style="background:#f778ba"></span>Scene Y · Tight</span><span><span class="legend-dot" style="background:#f0883e"></span>Centroid dist</span><span><span class="legend-dot" style="background:#58a6ff"></span>OT flow</span>';
  }
}

// ─── Init ────────────────────────────────────────────────────────────
updateExplanation(); updateLegend();
document.getElementById('compToggle').style.display = 'none';
requestAnimationFrame(animate);
</script>
</body>
</html>
